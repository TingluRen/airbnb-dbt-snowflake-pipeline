snapshots:
  - name: scd_dim_listings
    relation: ref('dim_listings')
    config:
      database: AIRBNB
      schema: snapshots
      alias: scd_dim_listings
      unique_key: LISTING_ID
      strategy: timestamp
      updated_at: LISTING_CREATED_AT
      dbt_valid_to_current: "to_date('9999-12-31')"