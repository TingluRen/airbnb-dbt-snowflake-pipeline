models:
  - name: silver_bookings
    description: "Cleaned and standardized booking data."
    columns:
      - name: booking_id
        tests:
          - not_null

      - name: listing_id
        tests:
          - not_null

      - name: booking_date
        tests:
          - not_null

  - name: silver_listings
    description: "Cleaned listing data with standardized attributes."
    columns:
      - name: listing_id
        tests:
          - not_null

      - name: host_id
        tests:
          - not_null

  - name: silver_hosts
    description: "Cleaned host data."
    columns:
      - name: host_id
        tests:
          - not_null